# Sunshine config — KDE Plasma 6 / Wayland.
#   capture = kwin   krfb-virtualmonitor outputs are compositor-level; the kms
#                    backend can't see them. sunshine-start.sh rewrites this to
#                    kms automatically when DISPLAY_BACKEND=evdi.
# output_name is filled in by sunshine-start.sh before launch.
capture = kwin
encoder = nvenc
fec_percentage = 20
locale = en
min_log_level = 2
output_name = HEADLESS-1
sunshine_name = Sunshine PC KDE
